# Lv8 フェーズA — 「同期 INSERT」の壁を再現する。
#   caddy(:8080) --> api x4 --> db
#
# 狙い: ASYNC_WRITE を渡さない → 同期 INSERT + 201 のまま。
#       write が DB commit 律速となり、VU 増加で write p95 が高止まりする。
#       Redis は不要（付けない）。
#
# 起動: docker compose -f stages/08-async-queue/docker-compose.wall.yml up --build -d
# 負荷: docker run --rm -i -e BASE_URL=http://host.docker.internal:8080 grafana/k6 run - < load/write-heavy.js
name: pal-lv8-wall

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pal
      POSTGRES_PASSWORD: pal
      POSTGRES_DB: pal
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pal -d pal"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ../../app
    environment:
      DATABASE_URL: postgres://pal:pal@db:5432/pal
      # ASYNC_WRITE not set → 同期 INSERT + 201（Lv0-7 互換）。
      PG_POOL_MAX: "10"
      PORT: "3000"
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
    deploy:
      replicas: 4

  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - api

volumes:
  pgdata:
