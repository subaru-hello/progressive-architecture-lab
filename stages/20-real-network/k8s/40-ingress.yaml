# k3s 標準 Ingress Controller = Traefik。
# k3d loadbalancer: ホスト :8081 -> Traefik :80 -> この Ingress -> api Service(port 80)。
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api
  namespace: pal-lv20
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 80
