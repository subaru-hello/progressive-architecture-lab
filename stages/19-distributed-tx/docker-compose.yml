# Lv19 — 分散トランザクション(none/2PC/saga)。Lv18 で items が別サービス+別DBになった後の世界。
#   POST /orders = 在庫デクリメント(items-db, items-service 経由) + order INSERT(orders-db) の 2DB 跨ぎ。
#   orders app が coordinator。ORDER_TX_MODE で3方式を切替、FAULT_POINT で障害注入して比較する。
#
#   api(monolith: orders+users, DB=db) --HTTP--> items-service(SERVICE=items, DB=items-db)
#   両 Postgres に max_prepared_transactions>0（2PC の PREPARE TRANSACTION 用）。
#
# 使い方（mode/fault は env で差し替えて api を作り直す・数十秒）:
#   ORDER_TX_MODE=2pc docker compose -f stages/19-distributed-tx/docker-compose.yml up -d --no-deps api
#   ORDER_TX_MODE=2pc FAULT_POINT=after-prepare-all docker compose ... up -d --no-deps api   # in-doubt 実演
#   ORDER_TX_MODE=saga FAULT_POINT=after-first-write docker compose ... up -d --no-deps api  # saga 補償実演
# in-doubt 確認: docker compose ... exec items-db psql -U pal -d pal -c "SELECT gid,prepared FROM pg_prepared_xacts;"
# 起動: docker compose -f stages/19-distributed-tx/docker-compose.yml up --build -d
# 負荷: docker run --rm -i -e BASE_URL=http://host.docker.internal:3000 grafana/k6 run - < load/order-tx.js
name: pal-lv19

x-pg-2pc: &pg-2pc
  image: postgres:16-alpine
  command: ["postgres", "-c", "max_prepared_transactions=50"]   # 2PC: PREPARE TRANSACTION を許可
  healthcheck: { test: ["CMD-SHELL", "pg_isready -U pal -d pal"], interval: 5s, timeout: 3s, retries: 10 }

services:
  db:                       # orders + users（coordinator 側 DB）
    <<: *pg-2pc
    environment: { POSTGRES_USER: pal, POSTGRES_PASSWORD: pal, POSTGRES_DB: pal }
    volumes: [pgdata:/var/lib/postgresql/data]

  items-db:                 # items 専用（reservations もここ）
    <<: *pg-2pc
    environment: { POSTGRES_USER: pal, POSTGRES_PASSWORD: pal, POSTGRES_DB: pal }
    volumes: [items-pgdata:/var/lib/postgresql/data]

  items-service:            # SERVICE=items（在庫の権威・prepare/reserve endpoint を持つ）
    build: ../../app
    environment:
      DATABASE_URL: postgres://pal:pal@items-db:5432/pal
      ARCH: hex
      SERVICE: items
      SEED_DEMO: "1"          # items-db にデモ在庫を seed
      PORT: "3000"
    ports:
      - "3001:3000"
    depends_on:
      items-db: { condition: service_healthy }

  api:                      # coordinator（orders+users）。ORDER_TX_MODE で3方式。
    build: ../../app
    environment:
      DATABASE_URL: postgres://pal:pal@db:5432/pal
      ARCH: hex
      SERVICE: all
      ORDERS_CROSS_CONTEXT: port
      ITEMS_SERVICE_URL: http://items-service:3000
      ITEMS_MIGRATION_MODE: secondary_only     # Lv18 cutover 後の世界＝items は items-service が権威。
                                               # これが無いと DualWrite が primary_only でローカル DB に落ち 2DB を跨がない(qa M1)。
      ORDER_TX_MODE: ${ORDER_TX_MODE:-none}    # none | 2pc | saga（測定時に差し替え）
      FAULT_POINT: ${FAULT_POINT:-}             # '' | after-first-write | after-prepare-all
      SEED_DEMO: "1"                             # users を seed（local items は未使用）
      PG_POOL_MAX: "10"
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      db: { condition: service_healthy }
      items-service: { condition: service_started }

volumes:
  pgdata:
  items-pgdata:
