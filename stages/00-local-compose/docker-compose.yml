# Lv0 — 個人開発レベル。1 API プロセス + 1 Postgres。scale-to-zero ではないが最小構成。
# 起動:  docker compose -f stages/00-local-compose/docker-compose.yml up --build
name: pal-lv0

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pal
      POSTGRES_PASSWORD: pal
      POSTGRES_DB: pal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pal -d pal"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ../../app
    environment:
      DATABASE_URL: postgres://pal:pal@db:5432/pal
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
