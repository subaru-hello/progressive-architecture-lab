# Lv9 — per-row commit → batched commit で drain レートを上げる。
#   caddy(:8080) --> api x4 --> redis (Stream) --> consumer --> db
#
# 狙い: BATCH_WRITES=1 で consumer がバッチを 1本の multi-row INSERT（1 commit）に束ねる。
#       commit 回数を N→1 に落として drain レートを上げる。
#       A/B: stage08 queue=per-row ↔ stage09=batched（同じ 1 consumer・同じ負荷）で
#       depth と commit lag の差を観測する。
#
# 観測:
#   depth: curl -s localhost:8080/metrics | grep write_queue_depth
#   commit lag + batch size: docker compose -f stages/09-batch-insert/docker-compose.queue.yml \
#     exec consumer wget -qO- localhost:3001/metrics | grep write_queue
#
# 起動: docker compose -f stages/09-batch-insert/docker-compose.queue.yml up --build -d
# 負荷: docker run --rm -i -e BASE_URL=http://host.docker.internal:8080 grafana/k6 run - < load/write-heavy.js
name: pal-lv9-batch

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pal
      POSTGRES_PASSWORD: pal
      POSTGRES_DB: pal
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pal -d pal"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    # AOF 永続化: コンテナ再起動後も未 ACK エントリを復元できる（教材ポイント）。
    # AOF off + XADD 前 crash で消えるデモは README 参照。
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ../../app
    environment:
      DATABASE_URL: postgres://pal:pal@db:5432/pal
      REDIS_URL: redis://redis:6379
      ASYNC_WRITE: "1"
      WRITE_QUEUE_MAX: "100000"
      PG_POOL_MAX: "10"
      PORT: "3000"
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 4

  consumer:
    build: ../../app
    # Dockerfile の CMD を上書きして consumer.js を起動。
    command: ["node", "dist/consumer.js"]
    environment:
      DATABASE_URL: postgres://pal:pal@db:5432/pal
      REDIS_URL: redis://redis:6379
      CONSUMER_CONCURRENCY: "10"
      CONSUMER_PORT: "3001"
      BATCH_WRITES: "1"
      WRITE_BATCH_SIZE: "100"
    # expose（host バインドしない）にしておくと `--scale consumer=2` でポート衝突しない。
    # host から lag metrics を見るときは compose 経由で:
    #   docker compose -f stages/09-batch-insert/docker-compose.queue.yml exec consumer wget -qO- localhost:3001/metrics | grep write_queue
    expose:
      - "3001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 1

  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - api

volumes:
  pgdata:
