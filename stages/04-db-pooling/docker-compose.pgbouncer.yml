# Lv4 フェーズB — 壁を PgBouncer（コネクションプーラ）で解く。
#   caddy(:8080) --> api x4 --(各 pool max=15)--> pgbouncer(:6432, transaction)--(<=15 本)--> db(max_connections=20)
#
# 狙い: db は同じ max_connections=20 のまま。間に PgBouncer を挟むと、api 側の 60 本の"client 接続"は
#       PgBouncer が受け止め（max_client_conn=1000）、db への"server 接続"は default_pool_size=15 に集約される。
#       15 <= 20 なので枯渇しない。＝フェーズA と同一負荷でも 5xx が消える。
#       transaction プーリング: トランザクション単位で server 接続を貸し出す（多数の短い query に最適）。
#
# 起動: docker compose -f stages/04-db-pooling/docker-compose.pgbouncer.yml up --build -d
# 負荷: docker run --rm -i -e BASE_URL=http://host.docker.internal:8080 grafana/k6 run - < load/db.js
name: pal-lv4-pgbouncer

services:
  db:
    image: postgres:16-alpine
    command: ["postgres", "-c", "max_connections=20"] # ← フェーズA と同条件のまま
    environment:
      POSTGRES_USER: pal
      POSTGRES_PASSWORD: pal
      POSTGRES_DB: pal
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pal -d pal"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: pal
      DB_PASSWORD: pal
      DB_NAME: pal
      AUTH_TYPE: scram-sha-256   # postgres16 の既定は scram
      POOL_MODE: transaction     # 短い query 多数 → トランザクション単位で server 接続を再利用
      MAX_CLIENT_CONN: "1000"    # api 側からの client 接続はいくらでも受ける
      DEFAULT_POOL_SIZE: "15"    # db へ張る server 接続は最大 15 に集約（< max_connections=20）
      LISTEN_PORT: "6432"
    depends_on:
      db:
        condition: service_healthy

  api:
    build: ../../app
    environment:
      DATABASE_URL: postgres://pal:pal@pgbouncer:6432/pal # ← db ではなく pgbouncer に接続
      PG_POOL_MAX: "15"
      PORT: "3000"
    expose:
      - "3000"
    depends_on:
      - pgbouncer
    deploy:
      replicas: 4

  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - api

volumes:
  pgdata:
