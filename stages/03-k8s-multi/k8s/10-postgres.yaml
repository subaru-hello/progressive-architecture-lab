# Postgres は 1 レプリカ + PVC(local-path)。複数ノードでも PV のあるノードに固定配置される。
# 単一 DB は Lv3 でも「次の壁」として残る（アプリは水平スケールできるが DB は別問題）。
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pg-data
  namespace: pal
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: pal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - { name: POSTGRES_USER, value: pal }
            - { name: POSTGRES_PASSWORD, value: pal }
            - { name: POSTGRES_DB, value: pal }
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "pal", "-d", "pal"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pg-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: pal
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
