# Lv6 フェーズB — Redis キャッシュ追加で read パスを高速化する。
#   caddy(:8080) --round robin--> api x4 --> redis (hit) | db (miss)
#
# 狙い: REDIS_URL を渡すことでキャッシュ有効化。
#       cache-aside(lazy) で items:latest100 を TTL 30s で保存し、
#       ヒット時は DB クエリ自体を消す（＝Lv5 の replica と違い仕事が「移る」でなく「消える」）。
#       POST 後は DEL で無効化するが、これはベストエフォート（並行 GET との
#       read-after-write 競合は残る＝キャッシュの難所。詳細は README / 05→06 の学習ログ）。
#
# 起動: docker compose -f stages/06-cache/docker-compose.cache.yml up --build -d
# 負荷: docker run --rm -i -e BASE_URL=http://host.docker.internal:8080 grafana/k6 run - < load/read-heavy.js
name: pal-lv6-cache

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pal
      POSTGRES_PASSWORD: pal
      POSTGRES_DB: pal
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pal -d pal"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ../../app
    environment:
      DATABASE_URL: postgres://pal:pal@db:5432/pal
      REDIS_URL: redis://redis:6379
      PG_POOL_MAX: "10"
      PORT: "3000"
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 4

  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - api

volumes:
  pgdata:
