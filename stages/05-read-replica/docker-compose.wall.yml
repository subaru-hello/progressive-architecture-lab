# Lv5 フェーズA — 「read/write 分離なし」の壁を再現する。
#   caddy(:8080) --round robin--> api x4 --> db-primary (read も write も集中)
#
# 狙い: read 95%/write 5% の偏った負荷を single primary に集中させ、
#       replica に read を逃がす前後のスループット差を体感する段。
#
# 起動: docker compose -f stages/05-read-replica/docker-compose.wall.yml up --build -d
# 負荷: docker run --rm -i -e BASE_URL=http://host.docker.internal:8080 grafana/k6 run - < load/read-heavy.js
name: pal-lv5-wall

services:
  db-primary:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pal
      POSTGRES_PASSWORD: pal
      POSTGRES_DB: pal
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pal -d pal"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ../../app
    environment:
      DATABASE_URL: postgres://pal:pal@db-primary:5432/pal
      # DATABASE_URL_RO not set → readPool falls back to DATABASE_URL (primary)
      # Both read and write go to the same primary — this is the "wall".
      PG_POOL_MAX: "10"
      PORT: "3000"
    expose:
      - "3000"
    depends_on:
      db-primary:
        condition: service_healthy
    deploy:
      replicas: 4

  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - api

volumes:
  pgdata:
