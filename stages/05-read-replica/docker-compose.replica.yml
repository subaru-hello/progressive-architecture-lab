# Lv5 フェーズB — read/write 分離でスループットを改善する。
#   caddy(:8080) --> api x4
#                       writePool --> db-primary(:5432)  ← INSERT/DDL
#                       readPool  --> db-replica(:5432)  ← SELECT
#
# 狙い: read 95%/write 5% の偏った負荷を primary/replica に分散し、
#       primary の負荷を大幅に下げる。ストリーミングレプリケーションで replica を同期。
#
# 起動: docker compose -f stages/05-read-replica/docker-compose.replica.yml up --build -d
# 負荷: docker run --rm -i -e BASE_URL=http://host.docker.internal:8080 grafana/k6 run - < load/read-heavy.js
name: pal-lv5-replica

services:
  db-primary:
    image: postgres:16-alpine
    command:
      - "postgres"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "hot_standby=on"
      - "-c"
      # No replication slot here (lab keeps it simple). If the replica falls behind
      # by more than this, the primary recycles the WAL and the standby needs a fresh
      # basebackup — the anonymous-volume design below self-heals that on recreate.
      # Production would use a replication slot instead.
      - "wal_keep_size=64MB"
    environment:
      POSTGRES_USER: pal
      POSTGRES_PASSWORD: pal
      POSTGRES_DB: pal
      REPL_PASSWORD: repl_secret
    volumes:
      - ./primary/init-replication.sh:/docker-entrypoint-initdb.d/init-replication.sh:ro
      - pgdata-primary:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pal -d pal"]
      interval: 5s
      timeout: 3s
      retries: 10

  db-replica:
    image: postgres:16-alpine
    entrypoint: ["/entrypoint.sh"]
    environment:
      PGDATA: /var/lib/postgresql/data
      PGPASSWORD: repl_secret
    volumes:
      - ./replica/entrypoint.sh:/entrypoint.sh:ro
      # Anonymous volume: a fresh `up` (recreate) starts clean so basebackup runs again.
      # NOTE: a plain container restart reuses the same anon volume and skips basebackup
      # (entrypoint's empty-PGDATA guard). Use `down` + `up` to force a clean rebuild.
      - /var/lib/postgresql/data
    depends_on:
      db-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pal -d pal"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: ../../app
    environment:
      DATABASE_URL: postgres://pal:pal@db-primary:5432/pal
      DATABASE_URL_RO: postgres://pal:pal@db-replica:5432/pal
      PG_POOL_MAX: "10"
      PG_POOL_MAX_RO: "10"
      PORT: "3000"
    expose:
      - "3000"
    depends_on:
      db-primary:
        condition: service_healthy
      db-replica:
        condition: service_healthy
    deploy:
      replicas: 4

  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - api

volumes:
  pgdata-primary:
